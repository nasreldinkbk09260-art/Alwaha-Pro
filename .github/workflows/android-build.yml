name: Alwaha Pro Android Auto-Build

on:
  push:
    branches:
      - main
  workflow_dispatch: # يتيح لك تشغيل البناء يدوياً من موقع جيتهاب

jobs:
  android-package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Set up Java Development Kit (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Android Build & PWA Wrapper CLI
        run: |
          npm install -g @bubblewrap/cli
          npm install -g @capacitor/cli @capacitor/core

      - name: Verify Web App Assets & Icons
        run: |
          echo "Checking application core components..."
          ls -la
          # التحقق من وجود الأيقونات الأساسية المعتمدة بالتسمية الدقيقة
          if [ -f "icon-192 (1).png" ] && [ -f "icon-512 (1).png" ]; then
            echo "✔ الأيقونات الرسمية المعتمدة icon-192 (1).png و icon-512 (1).png موجودة وجاهزة للدمج."
          else
            echo "⚠️ تنبيه: يرجى التأكد من مطابقة أسماء ملفات الأيقونات في المستودع الرئيسي لضمان نجاح البناء."
          fi

      - name: Initialize Android Project Framework
        run: |
          # بناء الهيكل الأصلي للأندرويد وتجهيز الكاش للملفات الستة (HTML, CSS, JS, Manifest, SW)
          npx cap init "Alwaha Pro" "com.alwahapro.digital" --web-dir=.
          npm install @capacitor/android
          npx cap add android

      - name: Inject Alwaha Pro Assets into Android Source
        run: |
          # مزامنة الكود والأزرار والواجهات الملكية داخل مجلد الأندرويد الأصلي
          npx cap sync android

      - name: Build Official Production APK (Assemble Release)
        run: |
          cd android && ./gradlew assembleRelease

      - name: Upload Generated Alwaha Pro APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Alwaha-Pro-Official-Release-APK
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
