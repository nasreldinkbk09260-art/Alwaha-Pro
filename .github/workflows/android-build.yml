name: Build Alwaha Pro (Android)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android Package (APK)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Initialize Project and Install Capacitor
        run: |
          if [ ! -f package.json ]; then npm init -y; fi
          npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor/assets

      - name: Set up Java JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install ImageMagick
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick
          convert -version

      - name: Initialize Capacitor Android Platform
        run: |
          # 1. إنشاء مجلد www ونقل ملفاتك إليه
          mkdir -p www
          cp -f *.html *.js *.css *.json *.png *.svg www/ 2>/dev/null || true
          
          # 2. ضبط الإعدادات بشكل صحيح لاستخدام مجلد www
          cat << 'EOF' > capacitor.config.json
          {
            "appId": "com.alwahapro.app",
            "appName": "Alwaha Pro",
            "webDir": "www"
          }
          EOF
          
          rm -rf android
          npx cap add android

      - name: Process Assets
        run: |
          # تثبيت المكتبة اللازمة
          npm install @capacitor/assets
          
          # استخدام صورتك icon.png الموجودة في المجلد الرئيسي
          if [ -f icon.png ]; then
            echo "Icon found, generating assets..."
            npx capacitor-assets generate --android --icon icon.png
          else
            echo "icon.png not found, skipping icon generation."
          fi

      - name: Sync Web Core and Scripts to Android
        run: |
          npx cap sync android

      - name: Accept Android SDK Licenses
        run: |
          yes | sdkmanager --licenses || true

      - name: Build Android App (Debug APK)
        run: |
          cd android
          if [ -n "$ANDROID_HOME" ]; then echo "sdk.dir=$ANDROID_HOME" > local.properties; fi
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon -Dorg.gradle.jvmargs="-Xmx2048m -XX:MaxMetaspaceSize=512m" --stacktrace

      - name: Upload Android APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Alwaha-Pro-Android-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
