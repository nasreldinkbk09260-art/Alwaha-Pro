name: Build Alwaha Pro Ultra Hybrid APK
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v3

      - name: Set up Node.js Environment
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Set up JDK 17 (Required for Modern Plugins)
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Prepare Web Assets Directory
        run: |
          mkdir -p www
          cp index.html www/ 2>/dev/null || true
          cp *.js www/ 2>/dev/null || true
          cp *.css www/ 2>/dev/null || true
          cp -r assets www/ 2>/dev/null || true
          cp -r images www/ 2>/dev/null || true

      - name: Install Capacitor Core & CLI
        run: npm install @capacitor/core @capacitor/cli

      # 🌟 ذكي: يتم التهيئة فقط إذا لم تكن الإعدادات موجودة مسبقاً لمنع التعارض
      - name: Initialize Capacitor Configuration if missing
        run: |
          if [ ! -f "capacitor.config.json" ] && [ ! -f "capacitor.config.ts" ]; then
            npx cap init "Alwaha Pro" "com.alwahapro.app" --web-dir=www
          fi

      - name: Install Plugins (Bluetooth, Wi-Fi, Network, OS)
        run: |
          npm install @capacitor-community/bluetooth-le
          npm install @capacitor/network @capgo/capacitor-wifi
          npm install @capacitor/android @capacitor/ios

      # 🌟 ذكي: إضافة منصة الأندرويد فقط إذا لم تكن مضافة مسبقاً في مشروعك
      - name: Add Android Platform if missing
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Sync Web Assets & Plugins to Platforms
        run: npx cap sync

      # 🌟 ذكي: إعطاء صلاحيات وترقية الـ Gradle تلقائياً لحل مشكلة ملف التشفير bcprov
      - name: Automatically Upgrade Gradle Wrapper to 8.7
        run: |
          cd android
          chmod +x gradlew
          ./gradlew wrapper --gradle-version 8.7 --distribution-type all

      # 🚀 بناء التطبيق النهائي مع صلاحيات كاملة وذاكرة مستقرة وبدون تعليق
      - name: Build Android Release APK
        env:
          GRADLE_OPTS: "-Xmx4096m -XX:MaxMetaspaceSize=1024m"
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon --no-parallel

      - name: Upload Finished APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Alwaha-Pro-Ultra-APK
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
