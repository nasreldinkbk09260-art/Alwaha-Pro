name: Build Alwaha Pro (Android Production)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Production Android Package (APK)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Initialize Project and Install Capacitor
        run: |
          if [ ! -f package.json ]; then npm init -y; fi
          npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Set up Java JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Initialize Capacitor Android Platform
        run: |
          mkdir -p www
          
          # [التعديل هنا] استخدام rsync لنسخ كافة المجلدات والملفات (بما فيها التبويبات الداخلية) بدلاً من الملفات السطحية فقط
          rsync -av --exclude='node_modules' --exclude='android' --exclude='www' --exclude='.git' --exclude='.github' ./ www/
          
          cat << 'EOF' > capacitor.config.json
          {
            "appId": "com.alwahapro.app",
            "appName": "Alwaha Pro",
            "webDir": "www"
          }
          EOF
          
          rm -rf android
          npx cap add android

      - name: Force Custom Icon & Fix Adaptive Fallback
        run: |
          SRC_ICON="icon.png"
          if [ ! -f "$SRC_ICON" ]; then
            SRC_ICON=$(find . -maxdepth 2 -name "*logo*.png" -o -name "*icon*.png" | head -n 1)
          fi
          
          if [ -n "$SRC_ICON" ] && [ -f "$SRC_ICON" ]; then
            echo "Found active application icon at: $SRC_ICON"
            for folder in android/app/src/main/res/mipmap-mdpi android/app/src/main/res/mipmap-hdpi android/app/src/main/res/mipmap-xhdpi android/app/src/main/res/mipmap-xxhdpi android/app/src/main/res/mipmap-xxxhdpi; do
              if [ -d "$folder" ]; then
                cp -f "$SRC_ICON" "$folder/ic_launcher.png"
                cp -f "$SRC_ICON" "$folder/ic_launcher_round.png"
              fi
            done
            rm -rf android/app/src/main/res/mipmap-anydpi-v26
          else
            echo "Error: Could not find icon.png or any logo asset in the project root!"
            exit 1
          fi

      - name: Sync Web Core and Scripts to Android
        run: |
          npx cap sync android

      - name: Accept Android SDK Licenses
        run: |
          yes | sdkmanager --licenses || true

      - name: Build Android App (Release APK)
        run: |
          cd android
          if [ -n "$ANDROID_HOME" ]; then echo "sdk.dir=$ANDROID_HOME" > local.properties; fi
          chmod +x gradlew
          ./gradlew clean assembleRelease --no-daemon -Dorg.gradle.jvmargs="-Xmx2048m -XX:MaxMetaspaceSize=512m" --stacktrace

      - name: Decode Keystore from Secrets
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          # [التعديل هنا] استخدام متغيرات البيئة لمنع تلف المفتاح ومسح أي مسافات زائدة
          echo "$KEYSTORE_BASE64" | tr -d '\n\r ' | base64 --decode > release.keystore
          
          # التحقق من أن الملف لم يخرج فارغاً
          if [ ! -s release.keystore ]; then
            echo "Error: Keystore file is empty! Check your KEYSTORE_BASE64 secret."
            exit 1
          fi

      - name: Sign Production APK
        run: |
          UNSIGNED_APK="android/app/build/outputs/apk/release/app-release-unsigned.apk"
          if [ ! -f "$UNSIGNED_APK" ]; then
            UNSIGNED_APK="android/app/build/outputs/apk/release/app-release.apk"
          fi
          
          BUILD_TOOLS_VERSION=$(ls $ANDROID_HOME/build-tools/ | sort -V | tail -n 1)
          
          $ANDROID_HOME/build-tools/$BUILD_TOOLS_VERSION/apksigner sign \
            --ks release.keystore \
            --ks-key-alias "${{ secrets.KEYSTORE_ALIAS }}" \
            --ks-pass pass:"${{ secrets.KEYSTORE_PASSWORD }}" \
            --key-pass pass:"${{ secrets.KEYSTORE_PASSWORD }}" \
            --out Alwaha-Pro-Final.apk "$UNSIGNED_APK"
          
          echo "Production APK is fully signed and ready!"

      - name: Upload Production Android APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Alwaha-Pro-Production-APK
          path: Alwaha-Pro-Final.apk
