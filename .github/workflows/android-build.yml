name: Build Alwaha Pro Ultra Hybrid APK
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v3

      - name: Set up Node.js Environment
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Set up JDK 17 (Required for Android)
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Capacitor Core & CLI
        run: npm install @capacitor/core @capacitor/cli

      - name: Initialize Capacitor Configuration
        run: npx cap init "Alwaha Pro" "com.alwahapro.app" --web-dir=.

      - name: Install Plugins (Bluetooth, Wi-Fi, Network, OS)
        run: |
          npm install @capacitor-community/bluetooth-le
          npm install @capacitor/network @capgo/capacitor-wifi
          npm install @capacitor/android @capacitor/ios

      - name: Add Android and iOS Platforms
        run: |
          npx cap add android
          npx cap add ios

      - name: Sync Web Assets & Plugins to Platforms
        run: npx cap sync

      - name: Build Android Release APK
        run: |
          cd android
          ./gradlew assembleRelease

      - name: Upload Finished APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Alwaha-Pro-Ultra-APK
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
