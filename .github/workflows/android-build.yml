name: Build Alwaha Pro Ultra Hybrid APK
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v3

      - name: Set up Node.js Environment
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      # 🌟 الانتقال إلى التوزيعة الأكثر استقراراً لتفادي مشاكل التحقق من الشهادات
      - name: Set up JDK 17 (Required for Android)
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Prepare Web Assets Directory
        run: |
          mkdir -p www
          cp index.html www/ 2>/dev/null || true
          cp *.js www/ 2>/dev/null || true
          cp *.css www/ 2>/dev/null || true
          cp -r assets www/ 2>/dev/null || true
          cp -r images www/ 2>/dev/null || true

      - name: Install Capacitor Core & CLI
        run: npm install @capacitor/core @capacitor/cli

      - name: Initialize Capacitor Configuration
        run: npx cap init "Alwaha Pro" "com.alwahapro.app" --web-dir=www

      - name: Install Plugins (Bluetooth, Wi-Fi, Network, OS)
        run: |
          npm install @capacitor-community/bluetooth-le
          npm install @capacitor/network @capgo/capacitor-wifi
          npm install @capacitor/android @capacitor/ios

      - name: Add Android and iOS Platforms
        run: |
          npx cap add android
          npx cap add ios

      - name: Sync Web Assets & Plugins to Platforms
        run: npx cap sync

      # 🛠️ خطوة حقن إجبارية لاعتماد إصدار حماية مستقر وخفيف يتخطى أزمة التجميع
      - name: Force Stable Crypto Library Version
        run: |
          echo "allprojects { configurations.all { resolutionStrategy { force 'org.bouncycastle:bcprov-jdk18on:1.78' } } }" >> android/build.gradle

      # 🚀 بناء التطبيق مع ضخ طاقة ذاكرة إضافية للسيرفر لمنع أي تعليق
      - name: Build Android Release APK
        env:
          GRADLE_OPTS: "-Xmx4096m -XX:MaxMetaspaceSize=1024m"
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon --no-parallel

      - name: Upload Finished APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Alwaha-Pro-Ultra-APK
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
