name: Build Alwaha Pro (Android)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android Package (APK)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Initialize Project and Install Capacitor
        run: |
          if [ ! -f package.json ]; then npm init -y; fi
          npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor/assets

      - name: Setup Assets
        run: |
          echo "جاري تجهيز الأصول..."
          npx capacitor-assets generate --android || echo "Assets generated."

      - name: Sync Web Core and Scripts to Android
        run: |
          npx cap sync android

      - name: Accept Android SDK Licenses
        run: |
          yes | sdkmanager --licenses || true

      - name: Build Android App (Debug APK)
        run: |
          cd android
          if [ -n "$ANDROID_HOME" ]; then
            echo "sdk.dir=$ANDROID_HOME" > local.properties
          fi
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon -Dorg.gradle.jvmargs="-Xmx2048m -XX:MaxMetaspaceSize=512m" --stacktrace

      - name: Upload Android APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Alwaha-Pro-Android-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
