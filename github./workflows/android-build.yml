name: Build Alwaha Pro (Android)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android Package (APK)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Initialize Project and Install Capacitor
        run: |
          if [ ! -f package.json ]; then npm init -y; fi
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npm install @capacitor/assets

      - name: Isolate Web Assets into www Directory
        run: |
          mkdir -p www
          cp index.html www/ 2>/dev/null || true
          cp *.js www/ 2>/dev/null || true
          cp *.css www/ 2>/dev/null || true
          cp *.png www/ 2>/dev/null || true
          cp *.jpg www/ 2>/dev/null || true
          [ -d assets ] && cp -r assets www/ || true
          [ -d css ] && cp -r css www/ || true
          [ -d js ] && cp -r js www/ || true

      - name: Set up Java JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Initialize Capacitor Android Platform
        run: |
          cat << 'EOF' > capacitor.config.json
          {
            "appId": "com.alwahapro.app",
            "appName": "Alwaha Pro",
            "webDir": "www"
          }
          EOF
          rm -rf android
          npx cap add android

      - name: Force Kotlin Dependencies Alignment
        run: |
          if [ -f android/build.gradle ]; then
            echo "ext.kotlin_version = '1.9.20'" >> android/build.gradle
          fi

      - name: Auto-Resize and Generate Icons/Splash
        run: |
          # هذه الخطوة الآن "آمنة": لو فشلت أو ملقيتش الأداة، هتكمل البناء عادي جداً
          echo "Starting Asset Generation..."
          # نحاول تسطيب الأداة فقط للسرعة، لو فشلت هنكمل بدونها
          sudo apt-get update && sudo apt-get install -y imagemagick || echo "ImageMagick skipped"
          
          # تشغيل التوليد الأساسي بدون الاعتماد على خطأ الـ convert
          npx capacitor-assets generate --android || echo "Capacitor assets failed, proceeding anyway"
          echo "✅ خطوة الصور تمت بنجاح (سواء بالمعالجة أو بدونها)"
          exit 0

      - name: Sync Web Core and Scripts to Android
        run: |
          npx cap sync android

      - name: Accept Android SDK Licenses
        run: |
          yes | sdkmanager --licenses || true

      - name: Build Android App (Debug APK)
        run: |
          cd android
          if [ -n "$ANDROID_HOME" ]; then
            echo "sdk.dir=$ANDROID_HOME" > local.properties
          fi
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon -Dorg.gradle.jvmargs="-Xmx2048m -XX:MaxMetaspaceSize=512m" --stacktrace

      - name: Upload Android APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Alwaha-Pro-Android-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
