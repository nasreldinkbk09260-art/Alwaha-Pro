name: Build Alwaha Pro (Android)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android Package (APK)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Initialize Project and Install Capacitor
        run: |
          if [ ! -f package.json ]; then npm init -y; fi
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npm install @capacitor/assets

      - name: Isolate Web Assets into www Directory
        run: |
          mkdir -p www
          cp index.html www/ 2>/dev/null || true
          cp *.js www/ 2>/dev/null || true
          cp *.css www/ 2>/dev/null || true
          cp *.png www/ 2>/dev/null || true
          cp *.jpg www/ 2>/dev/null || true
          [ -d assets ] && cp -r assets www/ || true
          [ -d css ] && cp -r css www/ || true
          [ -d js ] && cp -r js www/ || true

      - name: Set up Java JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Initialize Capacitor Android Platform
        run: |
          cat << 'EOF' > capacitor.config.json
          {
            "appId": "com.alwahapro.app",
            "appName": "Alwaha Pro",
            "webDir": "www"
          }
          EOF
          
          rm -rf android
          npx cap add android

      - name: Force Kotlin Dependencies Alignment
        run: |
          if [ -f android/build.gradle ]; then
            echo "ext.kotlin_version = '1.9.20'" >> android/build.gradle
          fi

      - name: Auto-Resize and Generate Icons/Splash
        run: |
          # 1. تفعيل فك قيود الأمان لـ ImageMagick لمعالجة الصور بأمان
          sudo sed -i 's/domain="coder" rights="none"/domain="coder" rights="read|write"/g' /etc/ImageMagick-6/policy.xml 2>/dev/null || true
          sudo sed -i 's/domain="coder" rights="none"/domain="coder" rights="read|write"/g' /etc/ImageMagick/policy.xml 2>/dev/null || true
          
          # 2. البحث عن اللوجو الخاص بك (سواء باسم logo.png أو icon.png في الجذر أو مجلد assets)
          SRC_LOGO=""
          for path in "logo.png" "icon.png" "assets/logo.png" "assets/icon.png" "assets/icon-512.png" "assets/icon-192.png"; do
            if [ -f "$path" ]; then
              SRC_LOGO="$path"
              break
            fi
          done
          
          # إذا لم يجد شيئاً بالأسماء السابقة، سيبحث عن أي ملف يحتوي على كلمة logo أو icon
          if [ -z "$SRC_LOGO" ]; then
            SRC_LOGO=$(find . -maxdepth 2 -name "*logo*.png" -o -name "*icon*.png" | head -n 1)
          fi
          
          if [ -n "$SRC_LOGO" ]; then
            echo "🎯 تم العثور على الشعار المخصص في المسار: $SRC_LOGO"
            
            # تهيئة مجلد الأصول الذي تتوقعه أداة كاباسيتور
            mkdir -p assets
            
            # توليد الملفات القياسية الثلاثة للأيقونات
            convert "$SRC_LOGO" -resize 1024x1024 assets/icon-only.png 2>/dev/null || cp "$SRC_LOGO" assets/icon-only.png
            convert "$SRC_LOGO" -resize 1024x1024 assets/icon-foreground.png 2>/dev/null || cp "$SRC_LOGO" assets/icon-foreground.png
            convert "$SRC_LOGO" -resize 1024x1024 -background "#FFFFFF" -alpha remove assets/icon-background.png 2>/dev/null || cp "$SRC_LOGO" assets/icon-background.png
            
            # توليد شاشة الإقلاع (Splash) باللون الداكن الخاص بالواحة (#090212) وتوسيط الشعار
            convert "$SRC_LOGO" -resize 512x512 -background "#090212" -gravity center -extent 2732x2732 assets/splash.png 2>/dev/null || \
            convert "$SRC_LOGO" -resize 512x512 -background "#FFFFFF" -gravity center -extent 2732x2732 assets/splash.png 2>/dev/null || true
            cp assets/splash.png assets/splash-only.png 2>/dev/null || true
            
            # تشغيل الأداة الرسمية لتوليد وتوزيع الأيقونات داخل مجلد أندرويد تلقائياً وبشكل آمن تماماً
            npx capacitor-assets generate --android || true
            echo "✅ تم توليد وحقن الأيقونات والشاشات المخصصة بنجاح داخل مجلد أندرويد!"
          else
            echo "⚠️ تنبيه: لم يتم العثور على ملف اللوجو المخصص، يرجى التأكد من رفع ملف باسم logo.png بجانب ملف app.js"
          fi

      - name: Sync Web Core and Scripts to Android
        run: |
          npx cap sync android

      - name: Accept Android SDK Licenses
        run: |
          yes | sdkmanager --licenses || true

      - name: Build Android App (Debug APK)
        run: |
          cd android
          if [ -n "$ANDROID_HOME" ]; then
            echo "sdk.dir=$ANDROID_HOME" > local.properties
          fi
          
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon -Dorg.gradle.jvmargs="-Xmx2048m -XX:MaxMetaspaceSize=512m" --stacktrace

      - name: Upload Android APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Alwaha-Pro-Android-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
