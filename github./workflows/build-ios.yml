name: Build Alwaha Pro (iOS)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-ios:
    name: Build iOS Package
    runs-on: macos-14
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Initialize Project and Install Capacitor
        run: |
          if [ ! -f package.json ]; then npm init -y; fi
          npm install @capacitor/core @capacitor/cli @capacitor/ios
          npm install @capacitor/assets

      - name: Isolate Web Assets into www Directory
        run: |
          mkdir -p www
          cp index.html www/ 2>/dev/null || true
          cp *.js www/ 2>/dev/null || true
          cp *.css www/ 2>/dev/null || true
          cp *.png www/ 2>/dev/null || true
          cp *.jpg www/ 2>/dev/null || true
          [ -d assets ] && cp -r assets www/ || true
          [ -d css ] && cp -r css www/ || true
          [ -d js ] && cp -r js www/ || true

      - name: Install CocoaPods
        run: |
          sudo gem install cocoapods

      - name: Install ImageMagick on macOS
        run: |
          brew install imagemagick

      - name: Initialize Capacitor iOS Platform
        run: |
          cat << 'EOF' > capacitor.config.json
          {
            "appId": "com.alwahapro.app",
            "appName": "Alwaha Pro",
            "webDir": "www"
          }
          EOF
          
          rm -rf ios
          npx cap add ios

      - name: Auto-Resize and Generate Icons/Splash
        run: |
          SRC_LOGO=""
          for path in "logo.png" "icon.png" "assets/logo.png" "assets/icon.png" "assets/icon-512.png" "assets/icon-192.png"; do
            if [ -f "$path" ]; then
              SRC_LOGO="$path"
              break
            fi
          done
          
          if [ -z "$SRC_LOGO" ]; then
            SRC_LOGO=$(find . -maxdepth 2 -name "*logo*.png" -o -name "*icon*.png" | head -n 1)
          fi
          
          if [ -n "$SRC_LOGO" ]; then
            echo "🎯 تم العثور على الشعار المخصص في المسار: $SRC_LOGO"
            mkdir -p assets
            
            convert "$SRC_LOGO" -resize 1024x1024 assets/icon-only.png 2>/dev/null || cp "$SRC_LOGO" assets/icon-only.png
            convert "$SRC_LOGO" -resize 1024x1024 assets/icon-foreground.png 2>/dev/null || cp "$SRC_LOGO" assets/icon-foreground.png
            convert "$SRC_LOGO" -resize 1024x1024 -background "#FFFFFF" -alpha remove assets/icon-background.png 2>/dev/null || cp "$SRC_LOGO" assets/icon-background.png
            
            convert "$SRC_LOGO" -resize 512x512 -background "#090212" -gravity center -extent 2732x2732 assets/splash.png 2>/dev/null || \
            convert "$SRC_LOGO" -resize 512x512 -background "#FFFFFF" -gravity center -extent 2732x2732 assets/splash.png 2>/dev/null || true
            cp assets/splash.png assets/splash-only.png 2>/dev/null || true
            
            npx capacitor-assets generate --ios || true
            echo "✅ تم توليد وحقن الأيقونات والشاشات المخصصة بنجاح داخل مجلد iOS!"
          else
            echo "⚠️ تنبيه: لم يتم العثور على ملف اللوجو المخصص."
          fi

          # ربط الأصول وإعداد المنصة
          npx cap sync ios

      - name: Build iOS Xcode Project (Simulator / Unsigned)
        run: |
          cd ios/App
          pod install
          xcodebuild -workspace App.xcworkspace -scheme App -sdk iphonesimulator -configuration Debug -derivedDataPath build CODE_SIGNING_ALLOWED=NO build

      - name: Compress App Bundle for Artifact Upload
        run: |
          cd ios/App/build/Build/Products/Debug-iphonesimulator
          zip -r Alwaha-Pro-iOS-Simulator.zip App.app

      - name: Upload iOS App Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Alwaha-Pro-iOS-Simulator
          path: ios/App/build/Build/Products/Debug-iphonesimulator/Alwaha-Pro-iOS-Simulator.zip
